# CI for contextual-intelligence (hardening pass Rev 3, Slice E).
#
# - The Qt suite is SEQUENTIAL by design; parallel pytest workers crash on
#   Windows widget teardown. Matrix jobs are separate machines, which is fine.
# - Qt platform: the native windows plugin (runners have a desktop session;
#   UIA, hotkeys and the clipboard are mocked in tests). If native window
#   creation ever fails on a runner image, set QT_QPA_PLATFORM=offscreen and
#   skip test_popup_error_message_not_clipped (font metrics differ offscreen)
#   instead of loosening its assertion.
# - Third-party actions are pinned by commit SHA; uv is pinned to the version
#   the lockfile was generated with.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  UV_VERSION: "0.11.26"

jobs:
  test:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # PR-range whitespace check needs history
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
      - name: Sync locked deps for the matrix interpreter
        # --python overrides .python-version (which pins 3.12) — without it
        # every nominal matrix job would silently run 3.12.
        run: uv sync --locked --python ${{ matrix.python-version }}
      - name: Assert interpreter matches matrix entry
        run: uv run python -c "import sys; v = '%d.%d' % sys.version_info[:2]; print(sys.executable, v); assert v == '${{ matrix.python-version }}', v"
      - name: Lint
        run: uv run ruff check .
      - name: Tests (sequential)
        run: uv run pytest -q
      - name: Whitespace check (PR range)
        if: github.event_name == 'pull_request'
        run: git diff --check ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}

  package:
    # One canonical artifact set, built once after the matrix passes; releases
    # attach these files and their digests, never a rebuild.
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
      - name: Build wheel + sdist
        run: uv build
      - name: Record tool versions and artifact digests
        run: |
          uv --version
          Get-FileHash dist/* -Algorithm SHA256 | Format-List
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  install-check:
    # The same canonical wheel installed under every supported interpreter,
    # in a clean venv outside any checkout.
    needs: package
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist
      - name: Install wheel into a clean venv and smoke it
        run: |
          uv venv "$env:TEMP\ci-venv" --python ${{ matrix.python-version }}
          $wheel = Get-ChildItem dist\*.whl | Select-Object -First 1
          uv pip install --python "$env:TEMP\ci-venv\Scripts\python.exe" $wheel.FullName
          & "$env:TEMP\ci-venv\Scripts\ci-lookup.exe" --help
          if ($LASTEXITCODE -ne 0) { exit 1 }
          & "$env:TEMP\ci-venv\Scripts\python.exe" -c "import contextual_intelligence; print(contextual_intelligence.__version__)"
